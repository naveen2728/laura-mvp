<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Laura Desktop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <aside class="left-rail">
      <header class="brand">
        <div class="brand-mark">L</div>
        <div>
          <h1>Laura</h1>
          <p>Agent workspace</p>
        </div>
      </header>

      <section class="connect-card">
        <div class="section-title">
          <span>Connection</span>
          <span id="connectionStatus" class="status bad">Offline</span>
        </div>
        <input id="baseUrlInput" type="url" aria-label="Laura URL" />
        <input id="apiKeyInput" type="password" placeholder="bm_live_..." aria-label="Laura API key" />
        <div class="button-row">
          <button id="connectButton">Connect</button>
          <button id="clearButton" class="ghost">Clear</button>
        </div>
      </section>

      <section class="sidebar-section">
        <div class="section-title">
          <span>Projects</span>
          <button id="refreshButton" class="icon-button" title="Refresh">Refresh</button>
        </div>
        <div class="create-box">
          <input id="projectNameInput" placeholder="New project" />
          <textarea id="projectDescriptionInput" rows="2" placeholder="Description"></textarea>
          <button id="createProjectButton">Create project</button>
        </div>
        <div id="projectList" class="stack-list"></div>
      </section>

      <section class="sidebar-section tasks-section">
        <div class="section-title">
          <span id="taskTitle">Tasks</span>
          <button id="createTaskButton" class="icon-button" title="Add task">Add</button>
        </div>
        <div class="create-box">
          <textarea id="taskInstructionsInput" rows="2" placeholder="Task instructions"></textarea>
          <textarea id="taskContextInput" rows="2" placeholder="Optional context"></textarea>
        </div>
        <div id="taskList" class="stack-list"></div>
      </section>
    </aside>

    <main class="chat-shell">
      <header class="chat-header">
        <div>
          <p class="eyebrow">Active Thread</p>
          <h2 id="threadTitle">Laura Composer</h2>
        </div>
        <div class="header-controls">
          <select id="runProjectInput" aria-label="Project"></select>
          <select id="runAgentInput" aria-label="Agent"></select>
        </div>
      </header>

      <section id="messageList" class="message-list" aria-live="polite"></section>

      <footer class="composer">
        <textarea id="composerInput" rows="4" placeholder="Ask Laura to use shared memory, compare models, plan work, or run an agent..."></textarea>
        <div class="composer-actions">
          <span id="composerHint">Messages run through the selected agent and project memory.</span>
          <button id="runAgentButton">Send</button>
        </div>
      </footer>
    </main>

    <aside class="right-rail">
      <section class="inspector-card">
        <div class="section-title">
          <span>Memory Used</span>
        </div>
        <pre id="memoryPreview">Connect and select a project to see Laura memory.</pre>
      </section>

      <section class="inspector-card">
        <div class="section-title">
          <span>Model Providers</span>
          <button id="addModelButton" class="icon-button">Add</button>
        </div>
        <div class="compact-form">
          <input id="modelDisplayNameInput" placeholder="Kimi K2" />
          <select id="modelKindInput">
            <option value="openai-compatible">OpenAI-compatible</option>
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
            <option value="google">Google</option>
            <option value="ollama">Ollama</option>
            <option value="other">Other</option>
          </select>
          <input id="modelBaseUrlInput" placeholder="https://openrouter.ai/api/v1" />
          <input id="modelNameInput" placeholder="moonshotai/kimi-k2" />
          <input id="modelApiKeyInput" type="password" placeholder="Provider API key" />
        </div>
        <div id="modelList" class="mini-list"></div>
      </section>

      <section class="inspector-card">
        <div class="section-title">
          <span>Agents</span>
          <button id="addAgentButton" class="icon-button">Create</button>
        </div>
        <div class="compact-form">
          <input id="agentNameInput" placeholder="Coder" />
          <input id="agentRoleInput" placeholder="implementation" value="assistant" />
          <select id="agentModelInput"></select>
          <textarea id="agentPromptInput" rows="3" placeholder="System prompt"></textarea>
        </div>
        <div id="agentList" class="mini-list"></div>
      </section>
    </aside>

    <div id="toast" class="toast"></div>
    <script src="./app.js"></script>
  </body>
</html>
