services:
  - type: web
    name: laura-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: Laura MVP
      - key: CREATE_TABLES_ON_STARTUP
        value: "false"
      - key: MCP_ISSUER_URL
        sync: false
      - key: MCP_RESOURCE_SERVER_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: laura-postgres
          property: connectionString

databases:
  - name: laura-postgres
    databaseName: laura
    user: laura
