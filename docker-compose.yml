services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: bridgemind
      POSTGRES_USER: bridgemind
      POSTGRES_PASSWORD: bridgemind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridgemind -d bridgemind"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
